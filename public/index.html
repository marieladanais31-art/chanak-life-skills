<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chanak Life Skills &amp; Leadership</title>
<meta name="description" content="Ruta interactiva y bilingüe de Life Skills & Leadership de Chanak International Academy.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#12284b;--navy-2:#1c3a63;--green:#2f7d4f;--green-soft:#e7f2ea;--gold:#b98a2e;--gold-soft:#f6edd8;--paper:#fbfaf7;--ink:#1b2330;--muted:#5d6675;--line:#e4e2db;--card:#fff;--shadow:0 1px 2px rgba(18,40,75,.04),0 8px 24px rgba(18,40,75,.06);--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:600;line-height:1.1;letter-spacing:-.01em}
header.top{position:sticky;top:0;z-index:50;background:rgba(251,250,247,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top-inner{max-width:1080px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px}
.crest{width:38px;height:38px;border-radius:9px;background:var(--navy);color:#fff;display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:700;flex-shrink:0}
.brand h1{font-size:16px;color:var(--navy)}
.brand p{font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.badges{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;white-space:nowrap}
.badge.gold{background:var(--gold-soft);color:var(--gold);border:1px solid #e8d5a3}
.badge.green{background:var(--green-soft);color:var(--green);border:1px solid #c3e0cd}
.coins{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--navy);background:#fff;border:1px solid var(--line);padding:5px 12px;border-radius:20px}
.coins b{color:var(--gold)}
.lang{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:#fff}
.lang button{border:none;background:none;font-family:inherit;font-size:12px;font-weight:700;padding:6px 12px;cursor:pointer;color:var(--muted)}
.lang button.on{background:var(--navy);color:#fff}
.user-chip{display:none;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 6px 4px 14px}
.user-chip .uc-name{font-size:13px;font-weight:600;color:var(--navy)}
.user-chip .uc-band{font-size:10px;color:var(--green);font-weight:600}
.user-chip button{border:none;background:var(--paper);border-radius:16px;font-family:inherit;font-size:11px;font-weight:600;color:var(--muted);padding:6px 10px;cursor:pointer}
.user-chip button:hover{color:var(--navy)}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
.view{display:none;padding:32px 0 80px}
.view.active{display:block;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* AUTH */
#view-auth{min-height:calc(100vh - 64px);display:none;place-items:center;padding:40px 20px}
#view-auth.active{display:grid}
.auth-card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:36px;max-width:460px;width:100%}
.auth-card h2{font-size:28px;color:var(--navy);margin-bottom:6px}
.auth-card .auth-sub{color:var(--muted);font-size:14px;margin-bottom:22px}
.auth-card label{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
.auth-card input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:15px}
.auth-card input:focus{outline:none;border-color:var(--green)}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.type-btn{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:12px 8px;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.type-btn.on{border-color:var(--navy);background:var(--navy);color:#fff}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.4}
.auth-err{color:#b0413c;font-size:13px;font-weight:600;margin:12px 0 0;min-height:18px}
.btn.full{width:100%;margin-top:16px}
.sis-link{display:block;text-align:center;margin-top:16px;font-size:13px;font-weight:600;color:var(--green);text-decoration:none}
.sis-link:hover{text-decoration:underline}
.official{text-align:center;font-size:11px;color:var(--muted);margin-top:10px}
/* HERO + shared */
.hero{text-align:center;padding:48px 0 12px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--green);margin-bottom:14px}
.hero h2{font-size:clamp(34px,6vw,58px);color:var(--navy);margin-bottom:16px}
.hero .lead{max-width:600px;margin:0 auto;color:var(--muted);font-size:17px}
.verse{margin:26px auto 0;max-width:560px;font-family:'Fraunces',serif;font-style:italic;color:var(--navy-2);font-size:18px}
.verse span{display:block;font-style:normal;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-top:8px;font-family:'Inter',sans-serif}
.section-label{display:flex;align-items:center;gap:14px;margin:44px 0 22px}
.section-label h3{font-size:22px;color:var(--navy);white-space:nowrap}
.section-label::after{content:"";height:1px;background:var(--line);flex:1}
.profiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;cursor:pointer;text-align:left;transition:.2s;position:relative;overflow:hidden}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#c9d3e0}
.pcard .em{font-size:30px;display:block;margin-bottom:12px}
.pcard h4{font-size:18px;color:var(--navy);margin-bottom:4px}
.pcard .age{font-size:12px;font-weight:600;color:var(--green)}
.pcard p{font-size:13px;color:var(--muted);margin-top:10px}
.pcard .rec{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);background:var(--gold-soft);padding:3px 8px;border-radius:12px}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:8px 0;margin-bottom:8px}
.back:hover{color:var(--navy)}
.page-head{border-bottom:1px solid var(--line);padding-bottom:24px;margin-bottom:28px}
.page-head .eyebrow{margin-bottom:8px}
.page-head h2{font-size:clamp(28px,4vw,42px);color:var(--navy)}
.page-head p{color:var(--muted);margin-top:10px;max-width:640px}
.q-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
.q-tag{font-size:13px;font-weight:600;color:var(--navy-2);background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 14px}
.q-tag b{color:var(--green)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.mcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;cursor:pointer;transition:.18s;position:relative}
.mcard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.mcard .num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);font-weight:500}
.mcard h4{font-size:17px;color:var(--navy);margin:8px 0}
.mcard p{font-size:13px;color:var(--muted)}
.mcard .foot{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:11px;font-weight:600;flex-wrap:wrap}
.chip{padding:3px 9px;border-radius:20px}
.chip.new{background:var(--gold-soft);color:var(--gold)}
.chip.core{background:var(--green-soft);color:var(--green)}
.chip.faith{background:#ece5f5;color:#6b4fa0}
.chip.care{background:#fdeee6;color:#c0662e}
.chip.study{background:#e3eef7;color:#2f6ba5}
.chip.done{background:var(--navy);color:#fff}
.mcard .status{margin-left:auto;color:var(--muted);font-weight:500}
.tracks{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.tcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
.tcard .ic{font-size:24px}
.tcard h5{font-family:'Fraunces',serif;font-size:15px;color:var(--navy);margin:8px 0 2px}
.tcard small{font-size:11px;color:var(--muted)}
.capsule{max-width:720px;margin:0 auto}
.progress-line{height:4px;background:var(--line);border-radius:4px;overflow:hidden;margin:20px 0 30px}
.progress-line i{display:block;height:100%;background:var(--green);width:0;transition:width .4s}
.step{display:none}
.step.active{display:block;animation:fade .35s ease}
.step .kicker{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:10px}
.step h3{font-size:26px;color:var(--navy);margin-bottom:16px}
.step p{color:var(--ink);margin-bottom:14px;font-size:16px}
.scenario{background:var(--navy);color:#eaf0f8;border-radius:var(--radius);padding:24px;font-family:'Fraunces',serif;font-size:19px;line-height:1.4;margin-bottom:10px}
.diagram{background:var(--green-soft);border:1px solid #c3e0cd;border-radius:var(--radius);padding:22px;margin:18px 0}
.book{background:var(--gold-soft);border:1px solid #e8d5a3;border-radius:12px;padding:14px 16px;margin:16px 0;font-size:14px;color:#7a5a1e;line-height:1.5}
.deepen-box{background:#eef4fb;border:1px solid #cfe0f0;border-radius:12px;padding:16px 18px;margin:14px 0;font-size:15px;color:var(--navy)}
.level-tag{display:inline-block;font-size:13px;font-weight:600;color:var(--green);background:var(--green-soft);border-radius:20px;padding:6px 14px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;font-size:15px;font-family:inherit;color:var(--ink);transition:.15s}
.opt:hover{border-color:var(--green)}
.opt.correct{border-color:var(--green);background:var(--green-soft)}
.opt.wrong{border-color:#d98b8b;background:#fbecec}
.feedback{font-size:14px;padding:14px 16px;border-radius:12px;margin-top:6px;display:none}
.feedback.show{display:block}
.feedback.ok{background:var(--green-soft);color:var(--green)}
.feedback.no{background:#fbecec;color:#b0413c}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:18px 0}
.pool,.targets{display:flex;flex-direction:column;gap:10px}
.drag{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:14px;cursor:grab;user-select:none}
.drag.dragging{opacity:.4}
.target{border:1.5px dashed var(--line);border-radius:10px;padding:12px 14px;font-size:14px;min-height:48px;background:#fdfdfc}
.target b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.target.over{border-color:var(--green);background:var(--green-soft)}
.target.filled{border-style:solid;border-color:var(--green)}
.target .placed{background:var(--navy);color:#fff;border-radius:8px;padding:6px 10px;margin-top:6px;font-size:13px}
textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:14px;font-family:inherit;font-size:15px;resize:vertical;min-height:110px}
textarea:focus{outline:none;border-color:var(--green)}
.step-nav{display:flex;justify-content:space-between;margin-top:28px;gap:12px}
.btn{font-family:inherit;font-size:15px;font-weight:600;border-radius:12px;padding:12px 24px;cursor:pointer;border:none;transition:.15s}
.btn.primary{background:var(--navy);color:#fff}
.btn.primary:hover{background:var(--navy-2)}
.btn.ghost{background:none;color:var(--muted);border:1.5px solid var(--line)}
.btn.ghost:hover{color:var(--navy);border-color:var(--navy)}
.rubric{background:var(--gold-soft);border:1px solid #e8d5a3;border-radius:var(--radius);padding:20px;margin-top:20px}
.rubric h4{color:var(--gold);font-size:16px;margin-bottom:12px}
.rubric .r-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;color:var(--navy)}
.rubric .r-row b{color:var(--gold)}
.done-card{text-align:center;padding:40px 20px}
.done-card .medal{font-size:56px}
.done-card h3{font-size:28px;color:var(--navy);margin:12px 0}
.done-card p{color:var(--muted);max-width:440px;margin:0 auto 20px}
.coins-earned{display:inline-flex;align-items:center;gap:8px;background:var(--gold-soft);color:var(--gold);font-weight:700;padding:10px 20px;border-radius:24px;margin-bottom:24px}
.note{font-size:13px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:12px;padding:14px 16px;margin-top:18px}
.safe{background:#fdeee6;border:1px solid #f0cbb0;border-radius:12px;padding:14px 16px;margin-top:16px;font-size:14px;color:#8a4a22;line-height:1.5}
footer{border-top:1px solid var(--line);padding:24px 0;text-align:center;font-size:12px;color:var(--muted)}
footer b{color:var(--navy)}
@media(max-width:600px){.match-wrap{grid-template-columns:1fr}.top-inner{flex-wrap:wrap}.badges{width:100%;margin-left:0}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="crest">C</div>
    <div class="brand">
      <h1>Chanak International Academy</h1>
      <p data-i="subtitle">Life Skills &amp; Leadership</p>
    </div>
    <div class="badges">
      <div class="lang">
        <button id="btn-es" class="on" onclick="setLang('es')">ES</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
      </div>
      <span class="badge gold">MSA Candidacy</span>
      <span class="coins">🪙 <b id="coinCount">0</b> <span data-i="coins">ChanakCoins</span></span>
      <div class="user-chip" id="user-chip">
        <div><div class="uc-name"></div><div class="uc-band"></div></div>
        <button onclick="logout()" data-i="logout">Salir</button>
      </div>
    </div>
  </div>
</header>

<!-- AUTH -->
<div class="view" id="view-auth">
  <div class="auth-card" id="auth-card"></div>
</div>

<!-- HOME -->
<div class="view" id="view-home">
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow" data-i="hero-eyebrow"></div>
      <h2 data-i="hero-title"></h2>
      <p class="lead" data-i="hero-lead"></p>
      <div class="verse" id="hero-verse"></div>
    </div>
    <div class="section-label"><h3 data-i="sec-main"></h3></div>
    <div class="profiles" id="mainProfiles"></div>
    <div class="section-label"><h3 data-i="sec-modules"></h3></div>
    <div class="profiles" id="moduleProfiles"></div>
    <div class="section-label"><h3 data-i="sec-adult"></h3></div>
    <div class="profiles" id="adultProfiles"></div>
  </div>
</div>

<!-- LEVEL -->
<div class="view" id="view-level">
  <div class="wrap">
    <button class="back" onclick="showView('home')" data-i="back-home"></button>
    <div class="page-head">
      <div class="eyebrow" id="lvl-eyebrow"></div>
      <h2 id="lvl-title"></h2>
      <p id="lvl-desc"></p>
      <div class="q-row" id="lvl-quarters"></div>
    </div>
    <div class="section-label"><h3 data-i="sec-capsules"></h3></div>
    <div class="grid" id="lvl-capsules"></div>
    <div class="section-label"><h3 data-i="sec-tracks"></h3></div>
    <p style="color:var(--muted);font-size:14px;margin-bottom:16px" data-i="tracks-note"></p>
    <div class="tracks" id="lvl-tracks"></div>
    <div class="rubric">
      <h4 data-i="rubric-title"></h4>
      <div class="r-row"><span data-i="rubric-1"></span><b>40 pts</b></div>
      <div class="r-row"><span data-i="rubric-2"></span><b>30 pts</b></div>
      <div class="r-row"><span data-i="rubric-3"></span><b>30 pts</b></div>
    </div>
  </div>
</div>

<!-- CAPSULE -->
<div class="view" id="view-capsule">
  <div class="wrap">
    <button class="back" id="cap-back"></button>
    <div class="capsule">
      <div class="eyebrow" id="cap-eyebrow"></div>
      <h2 id="cap-title" style="color:var(--navy);font-size:30px"></h2>
      <div class="progress-line"><i id="cap-bar"></i></div>
      <div id="cap-steps"></div>
    </div>
  </div>
</div>

<footer>
  <b>Chanak International Academy</b> · FLDOE #134620 · MSA Candidacy · <span data-i="footer-1"></span><br>
  <span data-i="footer-2"></span>
</footer>

<script src="data.js"></script>
<script src="data-capsules.js"></script>
<script src="app.js"></script>
</body>
</html>
